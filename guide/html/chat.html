
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쳇봇</title>

    <link rel="stylesheet" href="../font/RemixIcon_Fonts_v4.9.1/remixicon.css">
    <link rel="stylesheet" href="../font/webfonts_Pretendard.css">
    <link rel="stylesheet" href="../js/swiper/css/swiper-bundle.min.css">

    <!-- 사용 컨텐츠 스타일 참고 파일 -->
    <link rel="stylesheet" href="../css/chatStyle.css">

    <!-- 라이브러리 -->
    <script src="../js/jquery-3.5.1.min.js"></script>
    <script src="../js/jquery-ui.js"></script>
    <script src="../js/swiper/js/swiper-bundle.js"></script>
    <script src="../js/swiper/js/swiper-bundle.min.js"></script>
</head>
<body>
    <section class="chat" aria-labelledby="chatTitle">
        <div class="chat__header">
            <h2 id="chatTitle" class="chat__title">
                <span class="chat__title-icon" aria-hidden="true">
                    <i class="ri-service-line"></i>
                </span>
                챗봇 상담
            </h2>
            <div class="chat__info">
                <span>글씨크기</span>
            </div>
        </div>

        <div class="chat__contents">
            <div class="chat__intro">
                <p>안녕하세요!</p>
                <p>무엇을 도와드릴까요?</p>
            </div>

            <div class="chat__keywords">
                <ul class="chat-keyword-list">
                    <li class="chat-keyword-list__item">
                        <button type="button" class="chat-keyword-list__button">방사선 안전교육</button>
                    </li>
                    <li class="chat-keyword-list__item">
                        <button type="button" class="chat-keyword-list__button">기금통합관리</button>
                    </li>
                </ul>
            </div>

            <ul class="message-list">
                <li class="message-list__item">
                    <div class="message-group message-group--bot">
                        <div class="message-group__speaker">
                            <span class="message-group__avatar" aria-hidden="true">
                               <i class="ri-outlet-line"></i>
                            </span>
                            <span class="message-group__name">방냥이</span>
                        </div>

                        <div class="message-group__item">
                            <div class="message-group__text" data-balloon-style="text">안녕하세요.</div>
                            <time class="message-group__time" datetime="2026-03-31T10:30">10:30</time>
                        </div>
                    </div>
                </li>

                <li>
                    <div class="message-group__slider"></div>
                    <div class="message-group__list"></div>
                </li>

                <li class="message-list__item message-list__item--date">
                    <div class="date-marker-area">
                        <time class="date-marker" datetime="2026-03-31">3월 31일</time>
                    </div>
                </li>

                <li class="message-list__item">
                    <div class="message-group message-group--user">
                        <div class="message-group__item">
                            <div class="message-group__text">
                                안녕하세요. 문의드립니다.
                                안녕하세요. 문의드립니다.
                                안녕하세요. 문의드립니다.
                                안녕하세요. 문의드립니다.
                                안녕하세요. 문의드립니다.
                            </div>
                            <time class="message-group__time" datetime="2026-03-31T10:30">10:30</time>
                        </div>
                    </div>
                </li>
            </ul>
        </div>

        <div class="chat__foot">
            <div class="chat-input">
                <!-- 토글메뉴 있을경우 -->
                <button
                    type="button"
                    class="button button--icon js-chat-toggle"
                    aria-expanded="false"
                    aria-controls="chatMenu">
                    <span class="icon" aria-hidden="true">
                        <i class="ri-add-line"></i>
                    </span>
                    <span class="sr-only">챗봇 하단메뉴 열기</span>
                </button>

                <div class="chat-input__field">
                    <label for="chatMessage" class="sr-only">메시지 입력</label>
                    <input
                        id="chatMessage"
                        name="chatMessage"
                        type="text"
                        placeholder="메시지를 입력하세요...">
                </div>

                <button type="button" class="button">전송</button>
            </div>

            <!-- 토글메뉴 있을경우 -->
            <div id="chatMenu" class="chat-menu" hidden>
                <ul class="chat-menu__list">
                    <li class="chat-menu__item">
                        <button type="button" class="chat-menu__button">메뉴1</button>
                    </li>
                    <li class="chat-menu__item">
                        <button type="button" class="chat-menu__button">메뉴2</button>
                    </li>
                </ul>
            </div>
        </div>
    </section>
</body>
</html>
