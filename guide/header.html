<script>
$(document).ready(function() {
    var $nav = $('.gnb');
    // nav의 초기 위치값 계산
    var navOffsetTop = $nav.offset().top;

    $(window).on('scroll', function() {
        // 현재 스크롤 위치 확인
        if ($(window).scrollTop() >= navOffsetTop) {
            $nav.addClass('is-fixed');
        } else {
            $nav.removeClass('is-fixed');
        }
    });

    // initGnb(); // gnb
    initGnbFullMenu();  //gnb full
});


function initGnb() {
    var gnb = document.querySelector('.gnb');
    if (!gnb) return;

    var items = gnb.querySelectorAll('.gnb__item');
    var buttons = gnb.querySelectorAll('.gnb__button');

    function closeAll() {
        items.forEach(function (item) {
            item.classList.remove('gnb__item--open');
            item.classList.remove('gnb__item--active');
        });

        buttons.forEach(function (btn) {
            btn.setAttribute('aria-expanded', 'false');
        });
    }

    function openItem(button) {
        var item = button.closest('.gnb__item');

        closeAll();

        item.classList.add('gnb__item--open');
        item.classList.add('gnb__item--active');

        button.setAttribute('aria-expanded', 'true');
    }

    function toggleItem(button) {
        var item = button.closest('.gnb__item');
        var isOpen = item.classList.contains('gnb__item--open');

        if (isOpen) {
            closeAll();
        } else {
            openItem(button);
        }
    }

    buttons.forEach(function (button) {
        button.addEventListener('click', function (e) {
            e.preventDefault();
            toggleItem(button);
        });
    });

    // 바깥 클릭 시 닫기
    document.addEventListener('click', function (e) {
        if (!gnb.contains(e.target)) {
            closeAll();
        }
    });

    // ESC 닫기
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
            closeAll();
        }
    });
}

function initGnbFullMenu() {
    var gnb = document.querySelector('.gnb');
    if (!gnb) return;

    var items = gnb.querySelectorAll('.gnb__item');
    var buttons = gnb.querySelectorAll('.gnb__button');
    var fullMenu = gnb.querySelector('.gnb__submenu--full');

    if (!fullMenu) return;

    function closeMenu() {
        gnb.classList.remove('gnb--open');

        items.forEach(function (item) {
            item.classList.remove('gnb__item--active');
        });

        fullMenu.classList.remove('gnb__submenu--open');
        fullMenu.setAttribute('hidden', '');

        buttons.forEach(function (button) {
            button.setAttribute('aria-expanded', 'false');
        });
    }

    function openMenu(button) {
        var currentItem = button.closest('.gnb__item');

        gnb.classList.add('gnb--open');

        items.forEach(function (item) {
            item.classList.remove('gnb__item--active');
        });

        if (currentItem) {
            currentItem.classList.add('gnb__item--active');
        }

        fullMenu.classList.add('gnb__submenu--open');
        fullMenu.removeAttribute('hidden');

        buttons.forEach(function (btn) {
            btn.setAttribute('aria-expanded', 'false');
        });

        button.setAttribute('aria-expanded', 'true');
    }

    function toggleMenu(button) {
        var isOpen = gnb.classList.contains('gnb--open');
        var isCurrentOpen = button.getAttribute('aria-expanded') === 'true';

        if (isOpen && isCurrentOpen) {
            closeMenu();
        } else {
            openMenu(button);
        }
    }

    buttons.forEach(function (button) {
        button.addEventListener('click', function (event) {
            event.preventDefault();
            toggleMenu(button);
        });

        button.addEventListener('keydown', function (event) {
            if (event.key === 'ArrowDown') {
                event.preventDefault();
                openMenu(button);

                var firstLink = fullMenu.querySelector(
                    'a, button, input, select, textarea, [tabindex]:not([tabindex="-1"])'
                );

                if (firstLink) {
                    firstLink.focus();
                }
            }
        });
    });

    document.addEventListener('click', function (event) {
        if (!gnb.contains(event.target)) {
            closeMenu();
        }
    });

    document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
            var activeButton = gnb.querySelector('.gnb__button[aria-expanded="true"]');

            closeMenu();

            if (activeButton) {
                activeButton.focus();
            }
        }
    });

    gnb.addEventListener('focusout', function () {
        setTimeout(function () {
            if (!gnb.contains(document.activeElement)) {
                closeMenu();
            }
        }, 0);
    });
}


</script>
